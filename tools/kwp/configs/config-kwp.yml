kwp:
    config-infdb: "config-infdb.yml" # only filename - change path in ".env" file "CONFIG_INFDB_PATH"
    logging:
        path: "kwp.log"
        level: "INFO" # ERROR, WARNING, INFO, DEBUG
    hosts:
        postgres:
            user: "{services/postgres/user}"
            password: "{services/postgres/password}"
            db: "{services/postgres/db}"
            host: "{services/postgres/host}"
            exposed_port: "{services/postgres/exposed_port}"
            epsg: "{services/postgres/epsg}"
    data:
        input_schema_basedata: basedata
        input_schema_ro-heat: ro_heat
        output_schema: kwp
