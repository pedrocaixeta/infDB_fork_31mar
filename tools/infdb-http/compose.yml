version: '3.8'

services:
  infdb-http:
    image: nginx:alpine
    container_name: infdb-http-server
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./htpasswd:/etc/nginx/.htpasswd:ro
      - ./files:/usr/share/nginx/html/files:ro
      - ./index.html:/usr/share/nginx/html/index.html:ro
    restart: unless-stopped
