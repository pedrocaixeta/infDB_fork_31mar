ro-heat:
    config-infdb: "config-infdb.yml" # only filename - change path in ".env" file "CONFIG_INFDB_PATH"
    logging:
        path: "ro-heat.log"
        level: "DEBUG" # ERROR, WARNING, INFO, DEBUG
    hosts:
        postgres:
            user: None
            password: None
            db: infdb
            host: need.energy
            exposed_port: 5432
            epsg: None # 3035 (Europe)
    data:
        input_schema: basedata
        output_schema: ro_heat
    upload:
        workers: 1
        concurrent: false          # Phase 0: keep simple path by default
        chunk_rows: 2000000        # Phase 1: larger chunks (1M rows)
        use_staging: true          # Phase 1: UNLOGGED staging + merge
        drop_indexes_on_load: true # Phase 1: build index after load
        sync_commit_off: true      # Phase 1: SET LOCAL synchronous_commit=off
        copy_commit_every: 2       # Commit frequency in chunks (1 = every chunk)
