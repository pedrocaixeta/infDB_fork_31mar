services:
    ro-heat:
        build:
            context: .
            dockerfile: Dockerfile
        volumes:
            - ./configs:/app/configs #:ro # for configs
            - ./:/app
            - ../../src/infdb_package:/app/mnt/infdb_package
            - /app/.venv
        extra_hosts:
            - "host.docker.internal:host-gateway"
        env_file:
            - ${CONFIG_INFDB_ENV_PATH}
            - .env
