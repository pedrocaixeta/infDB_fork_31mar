services:
    infdb-basedata:
        build:
            context: .
            dockerfile: Dockerfile
        volumes:
            - .:/app/ #:ro # for source code # for development only
            - ../../src/infdb_package:/app/mnt/infdb_package
            - /app/.venv # Exclude .venv from volume mount
        extra_hosts:
            - "host.docker.internal:host-gateway"
        env_file:
            - .env
            - ${CONFIG_INFDB_ENV_PATH}
