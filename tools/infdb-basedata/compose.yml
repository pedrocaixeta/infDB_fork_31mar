services:
    basedata-changelog:
        container_name: basedata-changelog
        build:
            context: ./liquibase
            dockerfile: Dockerfile
        env_file:
            - env_changelog.list
        volumes:
            - ./liquibase/changelog/:/liquibase/changelog:ro # only for development
            - ./liquibase/changelog/changelog-master.yml:/liquibase/changelog-master.yml:ro # only for development
        extra_hosts:
            - "host.docker.internal:host-gateway"

    infdb-basedata:
        build:
            context: .
            dockerfile: Dockerfile
        depends_on:
            basedata-changelog:
                condition: service_completed_successfully
        volumes:
            - .:/app/ #:ro # for source code # for development only
            - ../../src/infdb_package:/app/mnt/infdb_package
            - /app/.venv # Exclude .venv from volume mount # for development only
        extra_hosts:
            - "host.docker.internal:host-gateway"
        env_file:
            - ../../.env  # Load root environment variables first
            - env_infdb_basedata.list