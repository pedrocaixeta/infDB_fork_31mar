# Configuration file for process-streets
#
# This configuration file contains tool-specific settings and database connection parameters.
#
# Database Connection Parameters:
# - Parameters set to 'None' will be automatically replaced with values from the central
#   configuration file specified in 'config-infdb' (config-infdb.yml by default)
# - This approach allows you to run locally using centralized database settings
# - To connect to a remote infdb instance, replace 'None' values with your specific
#   connection parameters (user, password, db, host, exposed_port, epsg)
#
process-streets:
    config-infdb: "config-infdb.yml" # only filename - change path in ".env" file "CONFIG_INFDB_PATH"
    logging:
        path: "process-streets.log"
        level: "INFO" # ERROR, WARNING, INFO, DEBUG
    hosts:
        postgres:
            user: None
            password: None
            db: None
            host: None
            exposed_port: None
            epsg: None
    data:
        input:
            schema: opendata
            table_name: basemap_verkehrslinie
        output:
            schema: process_streets   # needs to be snake_case
            segments_table: segments
            nodes_table: nodes
        # OPTIONAL: nur wenn man GeoJSON schreiben möchte. Wenn kein output_dir eingetragen ist dann wird übersprungen
            file_export:
                status: active # oder: not-active
                output_dir: "."  # z.B. aktuelles Verzeichnis oder "data/process_streets"
                segments_geojson: segments.geojson
                nodes_geojson: nodes.geojson

    klasse_filter:
      - "Wirtschaftsweg"
      - "Hauptwirtschaftsweg"
      - "Gemeindestraße"
      #- "Rad- und Fußweg"
      #- "Gleis"
      #- "Fußweg"
      #- "Nicht öffentliche Straße"
      - "Landesstraße, Staatsstraße"
      #- "Eisenbahn"
      - "Bundesstraße"
      #- "Radweg"
      #- "Furt"
      #- "Zurollbahn, Taxiway"
      #- "Startbahn, Landebahn"
      - "Kreisstraße"
      #- "(Kletter-)Steig im Gebirge"

    apply_length_filter: True
    min_length_deadend_junction: 100
    remove_deadend_deadend: True
