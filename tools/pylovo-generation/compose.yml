services:
    pylovo-generation:
        build:
            context: .
            dockerfile: Dockerfile
        stdin_open: true  # Enable stdin for interactive input
        tty: true         # Allocate a pseudo-TTY
        env_file:
            - ../../.env  # Use root .env file with database credentials
        environment:
            # Pylovo-specific schema configuration
            TARGET_SCHEMA: pylovo
            INFDB_SOURCE_SCHEMA: basedata
            USE_INFDB: "True"
            CONFIG_INFDB_PATH: /app/mnt/configs-infdb
            # Optional: Override AGS selection for automation (comma-separated, e.g., "9185149,9185150")
            # If not set, will prompt interactively after showing available AGS from opendata.scope table
            # PYLOVO_AGS: "9185149"
        volumes:
            - ../../configs:/app/mnt/configs-infdb #:ro # for *.yml configs and generated files
            - ../../src/infdb-package:/app/mnt/infdb-package
            - /app/.venv # Exclude .venv from volume mount
        extra_hosts:
            - "host.docker.internal:host-gateway"