services:
    pylovo-generation:
        build:
            context: .
            dockerfile: Dockerfile
        stdin_open: true  # Enable stdin for interactive input
        tty: true         # Allocate a pseudo-TTY
        env_file:
            - ../../.env  # Use root .env file with database credentials
        environment:
            # Pylovo configuration
            USE_INFDB: "True"
            CONFIG_INFDB_PATH: /app/mnt/configs-infdb
        volumes:
            - ../../configs:/app/mnt/configs-infdb #:ro # for root *.yml configs
            - ./configs:/app/configs #:ro # for local pylovo config
            - ../../src/infdb-package:/app/mnt/infdb-package
            - /app/.venv # Exclude .venv from volume mount
        extra_hosts:
            - "host.docker.internal:host-gateway"