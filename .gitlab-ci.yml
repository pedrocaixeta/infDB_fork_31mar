# Linting job
lint:
  stage: lint
  <<: *install_uv
  dependencies:
    - setup
  script:
    - source .venv/bin/activate
    - uv pip install ruff
    - ruff check .
    - ruff format --check .
    # - mypy src/
  allow_failure: true

# Type checking
type-check:
  stage: lint
  <<: *install_uv
  dependencies:
    - setup
  script:
    - source .venv/bin/activate
    - uv pip install mypy
    - uv pip install types-PyYAML types-psycopg2 types-greenlet # additional dependencies for type checking
    - mypy src/

  allow_failure: true

# Security check
security:
  stage: lint
  <<: *install_uv
  dependencies:
    - setup
  script:
    - source .venv/bin/activate
    - uv pip install bandit safety
    - bandit -r src/
    - safety check
  allow_failure: true