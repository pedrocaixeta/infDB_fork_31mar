# .gitlab-ci.yml

# Global variables
variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  UV_CACHE_DIR: "$CI_PROJECT_DIR/.cache/uv"

# Default tags for all jobs
default:
  image: python:3.12-slim
  tags:
    - infdb-feature
    - docker
    - python


# Cache configuration
cache:
  paths:
    - .cache/pip
    - .cache/uv
    - .venv/

# Stages
stages:
  - setup
  - test
  - lint

# Install uv and dependencies
.install_uv: &install_uv
  before_script:
    - pip install uv

# Setup job
setup:
  stage: setup
  <<: *install_uv
  script:
    - uv venv
    - source .venv/bin/activate
    - uv pip install -e .
  artifacts:
    paths:
      - .venv/
    expire_in: 1 hour

