services:
  api:
    profiles:
      - api
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - ${SERVICES_PYGEOAPI_PORT}:${SERVICES_PYGEOAPI_PORT}
    environment:
      - PYGEOAPI_INTERNAL=http://pygeoapi:${SERVICES_PYGEOAPI_PORT}/
      - POSTGREST_INTERNAL=http://postgrest:${SERVICES_POSTGREST_PORT}/
    restart: unless-stopped
    networks:
      - infdb_network
