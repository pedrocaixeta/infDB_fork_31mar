services:
  jupyter:
    profiles:
      - notebook
    image: infdb/jupyter:latest
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${SERVICES_JUPYTER_EXPOSED_PORT}:8888"
    environment:
      SERVICES_JUPYTER_TOKEN: ${SERVICES_JUPYTER_TOKEN}
    volumes:
      - infdb-jupyter-data:/app/notebooks
      - ./README.md:/app/README.md
    networks:
      - infdb_network
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  infdb-jupyter-data:
    name: ${BASE_NAME}-jupyter-data