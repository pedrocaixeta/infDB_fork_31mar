services:
  jupyter:
    profiles:
      - notebook
    # 1. Use a stable tag, not 'latest'. scipy-notebook includes pandas/numpy/sqlalchemy out of the box.
    image: quay.io/jupyter/scipy-notebook:python-3.11
    
    # 2. FORCE the correct architecture to prevent Rosetta 2 emulation bugs.
    # Change this to linux/amd64 if you are on a Windows/Intel machine.
    platform: linux/arm64 
    
    restart: unless-stopped
    ports:
      - "${SERVICES_JUPYTER_EXPOSED_PORT:-8888}:8888"
    environment:
      # Use the newer config variable name to avoid the deprecation warnings in your log
      JUPYTER_TOKEN: ${SERVICES_JUPYTER_TOKEN:-infdb}
    volumes:
      # Local notebooks for live editing (optional - comment out to use only persistent volume)
      # Persistent volume for notebook data
      - infdb-jupyter-data:/home/jovyan/work
      - ./notebooks/:/home/jovyan/demo
      - ./README.md:/home/jovyan/Readme.md
      # You can safely uncomment your code mount once the kernel boots successfully
      # - ../../src/infdb_package:/home/jovyan/work/infdb_package
    
    # 3. Simplify the command. The official images automatically read the JUPYTER_TOKEN environment variable.
    command: start-notebook.sh --ServerApp.allow_origin='*' --ServerApp.ip='0.0.0.0'
    
    networks:
      - infdb_network
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  infdb-jupyter-data:
    name: ${BASE_NAME:-infdb}-jupyter-data