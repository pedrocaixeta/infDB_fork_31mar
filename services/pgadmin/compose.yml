services:
    pgadmin:
        image: dpage/pgadmin4
        # container_name: pgadmin
        restart: unless-stopped
        environment:
            PGADMIN_DEFAULT_EMAIL: ${SERVICES_PGADMIN_DEFAULT_EMAIL}
            PGADMIN_DEFAULT_PASSWORD: ${SERVICES_PGADMIN_DEFAULT_PASSWORD}
            PGADMIN_CONFIG_SERVER_MODE: "False"
            PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
        ports:
            - ${SERVICES_PGADMIN_EXPOSED_PORT}:80
        volumes:
            - ../../.generated/servers.json:/pgadmin4/servers.json:ro
            - ../../.generated/.pgpass:/pgadmin4/.pgpass:ro
            # - pgadmin_data:/var/lib/pgadmin
        networks:
            - ${BASE_NETWORK_NAME}
        # entrypoint: /bin/sh -c "chmod 600 pgadmin4/.pgpass; /entrypoint.sh;"
