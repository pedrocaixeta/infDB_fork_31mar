services:
  pgrstwatch:
    container_name: citydb-postgrest-configwatch
    image: python:3.12-slim
    working_dir: /conf
    volumes:
      - .:/conf:rw                           # mount ./postgrest → /conf
    environment:
      PYTHONUNBUFFERED: "1"
      POSTGREST_CONF_PATH: /conf            # directory; script will create postgrest.conf
      POSTGREST_DB_CHANNEL: pgrst
      POSTGREST_WATCH_INTERVAL_SEC: "1.0"
      POSTGREST_MIN_RELOAD_GAP_SEC: "3.0"
      POSTGREST_EXCLUDE_SCHEMAS: "pg_*,information_schema,postgrest"
      SERVICES_CITYDB_USER: ${SERVICES_CITYDB_USER}
      SERVICES_CITYDB_PASSWORD: ${SERVICES_CITYDB_PASSWORD}
      SERVICES_CITYDB_DB: ${SERVICES_CITYDB_DB}
      SERVICES_CITYDB_HOST: ${SERVICES_CITYDB_HOST}
      SERVICES_CITYDB_EXPOSED_PORT: 5432
      SERVICES_POSTGREST_PORT: ${SERVICES_POSTGREST_PORT:-3000}
    command:
      - /bin/sh
      - -lc
      - >
        python -m pip install --no-cache-dir psycopg[binary]
        && echo "[pgrstwatch] starting"
        && exec python -u /conf/watch_and_update_postgrest_conf.py
    healthcheck:
      test: ["CMD-SHELL", "test -s /conf/postgrest.conf"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 90s              # give pip + first write time to finish
    restart: unless-stopped
    depends_on:
      - citydb
    networks:
      - ${BASE_NETWORK_NAME}

  postgrest:
    image: postgrest/postgrest:latest
    container_name: citydb-api-postgrest
    command:
      - postgrest
      - /conf/postgrest.conf
    volumes:
      - .:/conf:ro                           # read-only is fine for PostgREST
    ports:
      - "${SERVICES_POSTGREST_PORT}:${SERVICES_POSTGREST_PORT}"
    depends_on:
      pgrstwatch:
        condition: service_healthy
    networks:
      - ${BASE_NETWORK_NAME}
