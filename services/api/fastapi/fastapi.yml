services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - ${SERVICES_API_PORT}:${SERVICES_API_PORT}
    environment:
      - PYGEOAPI_INTERNAL=http://pygeoapi:${SERVICES_PYGEOAPI_PORT}/ 
      - POSTGREST_INTERNAL=http://postgrest:${SERVICES_POSTGREST_PORT}/ 
    restart: unless-stopped
    networks:
      - ${BASE_NETWORK_NAME}


