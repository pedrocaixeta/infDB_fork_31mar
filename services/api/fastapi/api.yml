services:
  api:
    build:
      context: .                 # fastapi folder is the root
      dockerfile: Dockerfile
    container_name: infdb-api
    ports:
      - ${SERVICES_API_PORT}:${SERVICES_API_PORT}
    environment:
      - PYGEOAPI_INTERNAL=http://citydb-api-pygeoapi:${SERVICES_PYGEOAPI_PORT}/ 
      - POSTGREST_INTERNAL=http://citydb-api-postgrest:${SERVICES_POSTGREST_PORT}/ 
    # depends_on:
    #   - ${SERVICES_CITYDB_DB}
    #   # - ${SERVICES_TIMESCALEDB_DB}
    restart: unless-stopped
    networks:
        - ${BASE_NETWORK_NAME}
